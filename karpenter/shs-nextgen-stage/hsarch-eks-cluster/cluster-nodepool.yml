apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: minikube-pool
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  template:
    spec:
      nodeClassRef:
        name: minikube-demo  # links to EC2NodeClass
      taints: []
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
  disruption:
    consolidationPolicy: "WhenEmpty"
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: minikube-demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec: {}
